<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #000; font-family: sans-serif; color: #fff; }
      #root { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
      .clip { position: absolute; }
      h1 { font-size: 120px; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1920" data-height="1080">
      <h1 id="title" class="clip" data-start="0" data-duration="5" data-track-index="0">New Video</h1>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from("#title", { opacity: 0, scale: 0.8, duration: 1, ease: "back.out" }, 0);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
