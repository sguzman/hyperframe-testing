<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --color-bg: #0d0d0d;
        --color-accent: #cc0000;
        --color-tech: #00ffcc;
        --color-text: #e0e0e0;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--color-bg);
        font-family: 'Space Mono', monospace;
        color: var(--color-text);
      }

      #root { position: relative; width: 100%; height: 100%; padding: 100px; }
      .clip { position: absolute; }

      /* Dossier Elements */
      .header {
        font-family: 'Inter', sans-serif;
        font-size: 80px;
        font-weight: 900;
        text-transform: uppercase;
        border-bottom: 8px solid var(--color-text);
        padding-bottom: 20px;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }

      .scanning-text {
        font-size: 24px;
        color: var(--color-tech);
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      .cursor {
        display: inline-block;
        width: 15px;
        height: 30px;
        background: var(--color-tech);
        vertical-align: middle;
      }

      .data-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        margin-top: 80px;
        width: 1000px;
      }

      .data-item {
        border-left: 2px solid rgba(255, 255, 255, 0.2);
        padding-left: 30px;
      }

      .data-label {
        font-size: 20px;
        text-transform: uppercase;
        opacity: 0.5;
        margin-bottom: 10px;
      }

      .data-value {
        font-size: 60px;
        font-weight: 700;
        color: var(--color-text);
      }

      /* Top Secret Stamp */
      .stamp {
        font-family: 'Inter', sans-serif;
        font-size: 120px;
        font-weight: 900;
        color: var(--color-accent);
        border: 15px solid var(--color-accent);
        padding: 20px 60px;
        text-transform: uppercase;
        transform: rotate(-15deg);
        opacity: 0;
        pointer-events: none;
        z-index: 100;
      }

      /* Background Grid */
      .bg-texture {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
        background-size: 40px 40px;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="10" data-width="1920" data-height="1080">
      
      <div class="bg-texture clip" data-start="0" data-duration="10" data-track-index="0"></div>

      <!-- Scanning Header -->
      <div class="clip" style="top: 100px; left: 100px; width: 1720px;" data-start="0" data-duration="10" data-track-index="1">
        <div class="scanning-text" id="scan-line">SCANNING DATABASE...<span class="cursor" id="cursor"></span></div>
        <div class="header">
          <span>DOSSIER: TYPE-47</span>
          <span style="font-size: 30px; opacity: 0.6;">REF: 882-XJ</span>
        </div>
      </div>

      <!-- Data Fields -->
      <div class="data-grid clip" style="top: 350px; left: 100px;" data-start="1" data-duration="9" data-track-index="2">
        <div class="data-item">
          <div class="data-label">UNIT COUNT</div>
          <div class="data-value" id="val1">0</div>
        </div>
        <div class="data-item">
          <div class="data-label">RELIABILITY RATING</div>
          <div class="data-value" id="val2">0%</div>
        </div>
        <div class="data-item">
          <div class="data-label">OPERATIONAL RANGE</div>
          <div class="data-value" id="val3">0m</div>
        </div>
        <div class="data-item">
          <div class="data-label">DESTRUCTIVE POTENTIAL</div>
          <div class="data-value" id="val4">0.0</div>
        </div>
      </div>

      <!-- Classified Stamp -->
      <div class="stamp clip" id="stamp" style="top: 40%; left: 45%;" data-start="6" data-duration="4" data-track-index="5">
        CLASSIFIED
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // 1. Scanning Line Flickering
      tl.to("#scan-line", { opacity: 0.3, duration: 0.1, repeat: 50, yoyo: true, ease: "steps(1)" }, 0);
      tl.to("#cursor", { opacity: 0, duration: 0.5, repeat: 20, yoyo: true, ease: "steps(1)" }, 0);

      // 2. Data Counting Animation
      const data = {
        v1: 0,
        v2: 0,
        v3: 0,
        v4: 0
      };

      // We use dummy targets to keep it deterministic for Hyperframes
      tl.to(data, { 
        v1: 100000000, 
        duration: 3, 
        ease: "power2.out",
        onUpdate: () => {
          document.querySelector("#val1").innerText = Math.floor(data.v1).toLocaleString();
        }
      }, 1.5);

      tl.to(data, { 
        v2: 98, 
        duration: 2.5, 
        ease: "power2.out",
        onUpdate: () => {
          document.querySelector("#val2").innerText = Math.floor(data.v2) + "%";
        }
      }, 1.8);

      tl.to(data, { 
        v3: 400, 
        duration: 2, 
        ease: "power2.out",
        onUpdate: () => {
          document.querySelector("#val3").innerText = Math.floor(data.v3) + "m";
        }
      }, 2.1);

      tl.to(data, { 
        v4: 8.5, 
        duration: 3.5, 
        ease: "expo.out",
        onUpdate: () => {
          document.querySelector("#val4").innerText = data.v4.toFixed(1);
        }
      }, 2.4);

      // 3. Header reveal
      tl.from(".header", { width: 0, opacity: 0, duration: 1.5, ease: "expo.out" }, 0.5);

      // 4. Stamp Animation (Slams in)
      tl.to("#stamp", { 
        opacity: 1, 
        scale: 1, 
        duration: 0.2, 
        startAt: { scale: 5 }, 
        ease: "power4.in" 
      }, 6);
      
      // Subtle shake on slam
      tl.to("#root", { x: 10, y: -10, duration: 0.05, repeat: 3, yoyo: true }, 6.2);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
