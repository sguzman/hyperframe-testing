<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --color-bg: #0a0a0a;
        --color-accent: #cc0000;
        --color-blue: #003366;
        --color-gray: #2d3748;
        --color-text: #ffffff;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--color-bg);
        font-family: 'Inter', sans-serif;
        color: var(--color-text);
      }

      #root { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
      .clip { position: absolute; }

      /* Typography */
      .massive-text {
        font-size: 120px;
        font-weight: 900;
        letter-spacing: -0.05em;
        text-transform: uppercase;
        line-height: 0.9;
      }

      .chart-label {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 32px;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        width: 300px;
        text-align: right;
        margin-right: 40px;
      }

      .hit-value {
        font-size: 48px;
        font-weight: 900;
        background: var(--color-text);
        color: var(--color-bg);
        padding: 5px 20px;
        margin-left: 20px;
      }

      /* Chart Layout */
      .chart-container {
        width: 1400px;
        height: 700px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 30px;
        border-left: 4px solid var(--color-gray);
        padding-left: 0;
        position: relative;
      }

      .bar-row {
        display: flex;
        align-items: center;
        width: 100%;
      }

      .bar-track {
        flex: 1;
        height: 80px;
        background: rgba(255, 255, 255, 0.05);
        position: relative;
        display: flex;
        align-items: center;
      }

      .bar {
        height: 100%;
        background: var(--color-gray);
        transform-origin: left;
      }

      .bar.highlight {
        background: var(--color-accent);
      }

      /* Background Decoration */
      .bg-grid {
        position: absolute;
        inset: 0;
        background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
        background-size: 100px 100px;
        opacity: 0.3;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="10" data-width="1920" data-height="1080">
      
      <div class="bg-grid clip" data-start="0" data-duration="10" data-track-index="0"></div>

      <div style="z-index: 10; display: flex; flex-direction: column; align-items: flex-start; width: 1400px;">
        
        <h1 class="massive-text" id="main-title" style="margin-bottom: 60px;">ALLOCATION</h1>

        <div class="chart-container">
          
          <!-- Row 1 -->
          <div class="bar-row clip" id="row1" style="top: 0%;" data-start="1" data-duration="9" data-track-index="1">
            <div class="chart-label">SECTOR A</div>
            <div class="bar-track">
              <div class="bar" id="b1" style="width: 400px;"></div>
              <div class="hit-value" id="v1">400</div>
            </div>
          </div>

          <!-- Row 2 -->
          <div class="bar-row clip" id="row2" style="top: 20%;" data-start="1.2" data-duration="8.8" data-track-index="2">
            <div class="chart-label">SECTOR B</div>
            <div class="bar-track">
              <div class="bar" id="b2" style="width: 750px;"></div>
              <div class="hit-value" id="v2">750</div>
            </div>
          </div>

          <!-- Row 3 (Highlight) -->
          <div class="bar-row clip" id="row3" style="top: 40%;" data-start="1.4" data-duration="8.6" data-track-index="3">
            <div class="chart-label" style="color: var(--color-accent); font-weight: 900;">CRITICAL</div>
            <div class="bar-track">
              <div class="bar highlight" id="b3" style="width: 950px;"></div>
              <div class="hit-value" id="v3" style="background: var(--color-accent); color: white;">950</div>
            </div>
          </div>

          <!-- Row 4 -->
          <div class="bar-row clip" id="row4" style="top: 60%;" data-start="1.6" data-duration="8.4" data-track-index="4">
            <div class="chart-label">SECTOR D</div>
            <div class="bar-track">
              <div class="bar" id="b4" style="width: 550px;"></div>
              <div class="hit-value" id="v4">550</div>
            </div>
          </div>

          <!-- Row 5 -->
          <div class="bar-row clip" id="row5" style="top: 80%;" data-start="1.8" data-duration="8.2" data-track-index="5">
            <div class="chart-label">SECTOR E</div>
            <div class="bar-track">
              <div class="bar" id="b5" style="width: 300px;"></div>
              <div class="hit-value" id="v5">300</div>
            </div>
          </div>

        </div>

      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Title reveal
      tl.from("#main-title", { x: -50, opacity: 0, duration: 1, ease: "expo.out" }, 0.5);

      // Bars growth (horizontal)
      tl.from(".bar", { 
        scaleX: 0, 
        duration: 1.5, 
        stagger: 0.1, 
        ease: "expo.out" 
      }, 1);

      // Value "hit" reveal
      tl.from(".hit-value", { 
        x: -20, 
        opacity: 0, 
        duration: 0.6, 
        stagger: 0.1, 
        ease: "back.out(1.7)" 
      }, 1.5);

      // Label fade in
      tl.from(".chart-label", { 
        x: -30,
        opacity: 0, 
        duration: 1, 
        stagger: 0.1 
      }, 1.2);

      // Background grid reveal
      tl.from(".bg-grid", { opacity: 0, duration: 2 }, 0);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
