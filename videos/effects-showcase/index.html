<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <script src="vendor/gsap.min.js"></script>
    <style>
      :root {
        --scorch-pct: 0%;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px;
        overflow: hidden; background: #000;
        font-family: 'Space Grotesk', sans-serif;
      }

      #root { position: relative; width: 100%; height: 100%; }
      .clip { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

      /* LAYER 1: CONTENT */
      #base-layer {
        z-index: 10;
        background: radial-gradient(circle, #2a9d8f, #264653);
        display: flex; align-items: center; justify-content: center;
      }

      /* LAYER 2: SCANLINES (Very Bold for Verification) */
      #scanline-layer {
        z-index: 20;
        pointer-events: none;
        background: linear-gradient(
            rgba(18, 16, 16, 0) 50%, 
            rgba(0, 0, 0, 0.4) 50%
        );
        background-size: 100% 4px;
        opacity: 0.8;
      }

      /* LAYER 3: CELLULOID DAMAGE */
      #damage-layer {
        z-index: 30;
        pointer-events: none;
      }

      /* LAYER 4: SCORCH REVEAL */
      #scorch-layer {
        z-index: 100;
        background: black;
        /* Using clip-path for 100% compatibility */
        clip-path: circle(var(--scorch-radius, 0%) at 50% 50%);
      }

      .big-text {
        font-size: 150px; color: white; border: 20px solid white;
        padding: 60px; text-transform: uppercase; letter-spacing: 30px;
        text-align: center;
      }

      #ui-labels {
        z-index: 1000; position: absolute; top: 40px; left: 40px;
        color: #0f0; font-family: monospace; font-size: 24px;
        background: rgba(0,0,0,0.8); padding: 20px; border: 1px solid #0f0;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="15" data-width="1920" data-height="1080">
      
      <div id="base-layer" class="clip">
          <div id="content-mover">
            <div class="big-text">VISUAL<br>TEST</div>
            <div style="font-size: 40px; text-align: center; margin-top: 40px; letter-spacing: 10px;">[ SYSTEM_VALIDATION_02 ]</div>
          </div>
      </div>

      <div id="scanline-layer" class="clip"></div>
      
      <svg id="damage-layer" class="clip" style="background: transparent;">
        <!-- Damage elements will be injected here -->
      </svg>

      <!-- Note: the clip-path will reveal the content by making the black layer vanish from the center -->
      <div id="scorch-layer" class="clip"></div>

      <div id="ui-labels">
        STATUS: <span id="status-text">INITIALIZING</span><br>
        REVEAL: <span id="reveal-text">0%</span>
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      const statusEl = document.getElementById('status-text');
      const revealEl = document.getElementById('reveal-text');

      // 1. SCANLINE MOVEMENT (Constant)
      tl.to("#scanline-layer", { backgroundPosition: "0 100px", duration: 1, repeat: 14, ease: "none" }, 0);

      // 2. SCORCH REVEAL (0s - 4s)
      // Since clip-path: circle(0%) is a hole, we want the black layer to START with circle(150%) 
      // but wait, clip-path HIDES everything outside. 
      // To reveal, we actually want a "Hole" in the black layer.
      // Better: Use a mask. 
      // Let's use a simpler approach: Opacity for the base content reveal, but for the "burning" feel, 
      // let's animate the black layer's clip-path from 150% (show nothing of black) to 0%? No.
      
      // Correct Logic for SCORCH: 
      // Black layer is visible. We want to cut a hole in it.
      // CSS mask-image is best. Let's fix the syntax.
      document.getElementById('scorch-layer').style.webkitMaskImage = "radial-gradient(circle, transparent 0%, black 0%)";
      document.getElementById('scorch-layer').style.webkitMaskSize = "100% 100%";
      document.getElementById('scorch-layer').style.webkitMaskRepeat = "no-repeat";

      const scorchProxy = { val: 0 };
      tl.to(scorchProxy, {
        val: 100,
        duration: 4,
        ease: "power2.in",
        onUpdate: function() {
            const p = scorchProxy.val;
            document.getElementById('scorch-layer').style.webkitMaskImage = `radial-gradient(circle, transparent ${p}%, black ${p + 10}%)`;
            revealEl.innerText = Math.floor(p) + "%";
            statusEl.innerText = "SCORCH_REVEAL_ACTIVE";
        }
      }, 0);

      // 3. BASE MOVEMENT
      tl.fromTo("#content-mover", { scale: 0.8, rotation: -5 }, { scale: 1.2, rotation: 5, duration: 15, ease: "sine.inOut" }, 0);

      // 4. CELLULOID DAMAGE (12s - 15s)
      const damageLayer = document.getElementById('damage-layer');
      // Pre-generate 100 damage frames to ensure they are in the timeline
      for(let t=0; t<15; t+=0.06) {
          const x = Math.random() * 1920;
          const y = Math.random() * 1080;
          const circ = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          circ.setAttribute("cx", x); circ.setAttribute("cy", y);
          circ.setAttribute("r", 5 + Math.random() * 10);
          circ.setAttribute("fill", "white");
          circ.setAttribute("opacity", "0");
          damageLayer.appendChild(circ);
          tl.to(circ, { opacity: 1, duration: 0.03, repeat: 1, yoyo: true }, t);

          if(Math.random() > 0.5) {
              const lx = Math.random() * 1920;
              const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
              line.setAttribute("x1", lx); line.setAttribute("y1", 0);
              line.setAttribute("x2", lx + (Math.random()-0.5)*30); line.setAttribute("y2", 1080);
              line.setAttribute("stroke", "white"); line.setAttribute("stroke-width", "2");
              line.setAttribute("opacity", "0");
              damageLayer.appendChild(line);
              tl.to(line, { opacity: 1, duration: 0.03, repeat: 1, yoyo: true }, t);
          }
      }

      tl.add(() => statusEl.innerText = "DAMAGE_OVERLAY_ON", 4);
      tl.add(() => statusEl.innerText = "FULL_SYSTEM_ACTIVE", 8);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
