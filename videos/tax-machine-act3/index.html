<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --color-bg: #1D3557;
        --color-power: #E63946;
        --color-technical: #457B9D;
        --color-value: #FFB703;
        --color-neutral: #F1FAEE;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden;
        background: var(--color-bg); font-family: 'Montserrat', sans-serif; color: var(--color-neutral);
      }
      #root { position: relative; width: 100%; height: 100%; overflow: hidden; }
      .clip { position: absolute; }
      
      .massive-title { font-size: 100px; font-weight: 900; letter-spacing: -0.05em; text-transform: uppercase; line-height: 0.9; }
      .technical-label { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 300; text-transform: uppercase; letter-spacing: 0.4em; color: var(--color-technical); }
      .data-value { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 48px; color: var(--color-value); }

      /* Highway */
      .highway {
        width: 2000px; height: 400px; background: #0f1c2d; transform: perspective(1000px) rotateX(45deg);
        border-top: 10px solid var(--color-neutral); border-bottom: 10px solid var(--color-neutral);
        display: flex; flex-direction: column; justify-content: center;
      }
      .lane-divider { width: 100%; height: 5px; border-top: 5px dashed rgba(255,255,255,0.2); }

      /* Signpost */
      .signpost {
        width: 300px; height: 200px; background: var(--color-technical); border: 10px solid var(--color-neutral);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
      }
      .signpost.red { background: var(--color-power); }

      /* Building */
      .building-silhouette {
        width: 400px; height: 800px; background: #0a1523; position: relative;
      }
      .building-panel {
        position: absolute; width: 100%; height: 60px; background: var(--color-technical); border-left: 10px solid var(--color-value);
        display: flex; align-items: center; padding: 0 20px; font-family: 'Space Grotesk'; font-size: 18px;
      }

      /* Container */
      .container-box {
        width: 400px; height: 200px; background: var(--color-power); border: 8px solid var(--color-neutral);
        display: flex; align-items: center; justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="60" data-width="1920" data-height="1080">
      
      <!-- SCENE 1: THE HIGHWAY -->
      <div id="scene-highway" class="clip" style="width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <h1 class="massive-title" id="title-1" style="position: absolute; top: 100px; left: 100px;">SEPARATE<br>LANES</h1>
        
        <div class="highway" id="main-highway">
          <div class="lane-divider"></div>
        </div>

        <div id="sign-1" class="signpost red clip" style="left: 400px; top: 300px;">
          <p class="technical-label" style="color: white;">LABOR</p>
          <h2 class="massive-title" style="font-size: 80px;">37%</h2>
        </div>

        <div id="sign-2" class="signpost clip" style="right: 400px; top: 300px;">
          <p class="technical-label" style="color: white;">CAPITAL</p>
          <h2 class="massive-title" style="font-size: 80px;">20%</h2>
        </div>
      </div>

      <!-- SCENE 2: CORPORATE LAYERS -->
      <div id="scene-corporate" class="clip" style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; opacity: 0;">
        <div style="margin-right: 100px;">
          <p class="technical-label">CORPORATE_MACHINE</p>
          <h1 class="massive-title">THE<br>LAYERS</h1>
          <div class="data-value" style="margin-top: 20px;">21% BASE RATE</div>
        </div>
        <div class="building-silhouette" id="building">
          <!-- Panels added via JS -->
        </div>
      </div>

      <!-- SCENE 3: TARIFFS -->
      <div id="scene-tariffs" class="clip" style="width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0;">
        <div id="crane-arm" style="width: 4px; height: 300px; background: var(--color-neutral); position: absolute; top: 0;"></div>
        <div class="container-box" id="container">
          <h1 class="massive-title" style="font-size: 120px;">TARIFF</h1>
        </div>
        <div class="data-value" style="margin-top: 100px;" id="tariff-value">+10% SURCHARGE</div>
      </div>

       <!-- PANEL WIPE -->
      <div id="wipe-panel" class="clip" style="width: 100%; height: 100%; background: var(--color-value); left: -100%; z-index: 100;"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // --- TIMELINE ---

      // 1. Highway Entrance (0s - 15s)
      tl.from("#main-highway", { scaleX: 0, opacity: 0, duration: 1.5, ease: "expo.out" }, 1);
      tl.from("#title-1", { x: -100, opacity: 0, duration: 1.2 }, 0.5);
      tl.from("#sign-1", { y: -500, rotation: -10, duration: 1.5, ease: "bounce.out" }, 2);
      tl.from("#sign-2", { y: -500, rotation: 10, duration: 1.5, ease: "bounce.out" }, 2.5);

      // 2. Transition to Corporate (15s - 16s)
      tl.to("#scene-highway", { opacity: 0, y: 500, duration: 1 }, 15);
      tl.to("#scene-corporate", { opacity: 1, duration: 1 }, 15.5);

      // 3. Corporate Panels (16s - 35s)
      const building = document.getElementById("building");
      const panels = ["DEDUCTIONS", "CREDITS", "TIMING RULES", "INTERNATIONAL", "DEPRECIATION"];
      panels.forEach((p, i) => {
        const panel = document.createElement("div");
        panel.className = "building-panel";
        panel.style.top = `${100 + (i * 80)}px`;
        panel.innerHTML = `<span>${p}</span>`;
        building.appendChild(panel);
        tl.from(panel, { x: 400, opacity: 0, duration: 1, ease: "expo.out" }, 17 + (i * 0.5));
      });

      // 4. Wipe to Tariffs (35s - 36s)
      tl.to("#wipe-panel", { left: "0%", duration: 0.8, ease: "power4.inOut" }, 35);
      tl.set("#scene-corporate", { opacity: 0 }, 35.4);
      tl.set("#scene-tariffs", { opacity: 1 }, 35.4);
      tl.to("#wipe-panel", { left: "100%", duration: 0.8, ease: "power4.inOut" }, 35.8);

      // 5. Crane / Container (36s - 50s)
      tl.from("#crane-arm", { y: -500, duration: 1.5, ease: "power2.out" }, 36.5);
      tl.from("#container", { y: -500, duration: 1.5, ease: "power2.out" }, 36.5);
      tl.from("#tariff-value", { scale: 0, opacity: 0, duration: 1, ease: "back.out(1.7)" }, 38);

      // 6. Global analytical pressure
      tl.to("#scene-tariffs", { scale: 1.1, duration: 10, ease: "power1.inOut" }, 50);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
