<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --color-red: #cc0000;
        --color-blue: #003366;
        --color-gold: #ffcc00;
        --color-black: #0a0a0a;
        --color-text: #ffffff;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--color-black);
        font-family: 'Inter', sans-serif;
        color: var(--color-text);
      }

      #root {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .scene {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .clip {
        position: absolute;
      }

      /* Transitions */
      .wipe-panel {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 100;
        transform: translateY(-100%);
      }

      /* Typography: Propaganda Style */
      .massive-text {
        font-size: 280px;
        font-weight: 900;
        letter-spacing: -0.06em;
        line-height: 0.8;
        text-transform: uppercase;
        text-align: center;
      }

      .hit-label {
        font-size: 80px;
        font-weight: 900;
        background: var(--color-text);
        color: var(--color-black);
        padding: 10px 40px;
        text-transform: uppercase;
        transform: rotate(-2deg);
      }

      .tech-detail {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 40px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        opacity: 0.6;
      }

      /* Layouts */
      .diagonal-bg {
        position: absolute;
        width: 200%;
        height: 200%;
        background: var(--color-red);
        transform: rotate(-15deg);
        top: -50%;
        left: -50%;
      }

      .icon-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 60px;
        width: 80%;
      }

      .icon-card {
        aspect-ratio: 1;
        background: rgba(255, 255, 255, 0.05);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border: 2px solid rgba(255, 255, 255, 0.1);
      }

      .icon-svg {
        width: 60%;
        fill: currentColor;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="20" data-width="1920" data-height="1080">
      
      <!-- Wipes -->
      <div id="wipe-v" class="wipe-panel clip" style="background: var(--color-red);" data-start="0" data-duration="20" data-track-index="99"></div>

      <!-- Scene 1: IDEOLOGY (RED) -->
      <div id="scene-1" class="scene clip" data-start="0" data-duration="5" data-track-index="1">
        <div class="diagonal-bg clip" data-start="0" data-duration="5" data-track-index="0"></div>
        <div style="z-index: 10; display: flex; flex-direction: column; align-items: center;">
          <h1 class="massive-text" id="t1">THE<br>MACHINE</h1>
          <div class="hit-label clip" id="label-1" style="top: 60%; left: 60%;" data-start="1" data-duration="4" data-track-index="2">ORIGIN</div>
        </div>
      </div>

      <!-- Scene 2: LOGIC (BLUE) -->
      <div id="scene-2" class="scene clip" data-start="5" data-duration="5" data-track-index="1">
        <div class="clip" style="inset: 0; background: var(--color-blue);" data-start="5" data-duration="5" data-track-index="0"></div>
        <div style="display: grid; grid-template-columns: 1fr 1.5fr; width: 100%; height: 100%;">
          <div style="display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.3);">
            <svg class="icon-svg clip" id="gear" viewBox="0 0 100 100" data-start="5" data-duration="5" data-track-index="2">
              <path d="M50 30c-11 0-20 9-20 20s9 20 20 20 20-9 20-20-9-20-20-20zm0 30c-5.5 0-10-4.5-10-10s4.5-10 10-10 10 4.5 10 10-4.5 10-10 10zM50 10l-5 10h10l-5-10zM50 90l-5-10h10l-5 10zM10 50l10-5v10l-10-5zM90 50l-10-5v10l10-5z" />
            </svg>
          </div>
          <div style="display: flex; flex-direction: column; justify-content: center; padding: 100px;">
            <p class="tech-detail" id="td1">ENGINEERING DATA</p>
            <h2 class="massive-text" id="t2" style="font-size: 140px; text-align: left;">RELIABLE<br>SIMPLE</h2>
          </div>
        </div>
      </div>

      <!-- Scene 3: VALUE (GOLD) -->
      <div id="scene-3" class="scene clip" data-start="10" data-duration="5" data-track-index="1">
        <div class="clip" style="inset: 0; background: var(--color-gold);" data-start="10" data-duration="5" data-track-index="0"></div>
        <div class="icon-grid">
          <div class="icon-card clip" data-start="10.5" data-duration="4.5" data-track-index="2" id="c1">
            <svg class="icon-svg" style="fill: var(--color-black);" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" /></svg>
            <p style="color: var(--color-black); font-weight: 900; margin-top: 20px;">MASS PRODUCTION</p>
          </div>
          <div class="icon-card clip" data-start="11" data-duration="4" data-track-index="3" id="c2">
            <svg class="icon-svg" style="fill: var(--color-black);" viewBox="0 0 100 100"><path d="M20 80 L50 20 L80 80 Z" /></svg>
            <p style="color: var(--color-black); font-weight: 900; margin-top: 20px;">GLOBAL REACH</p>
          </div>
          <div class="icon-card clip" data-start="11.5" data-duration="3.5" data-track-index="4" id="c3">
            <svg class="icon-svg" style="fill: var(--color-black);" viewBox="0 0 100 100"><rect x="20" y="20" width="60" height="60" /></svg>
            <p style="color: var(--color-black); font-weight: 900; margin-top: 20px;">LOW COST</p>
          </div>
        </div>
      </div>

      <!-- Scene 4: LEGACY (BLACK) -->
      <div id="scene-4" class="scene clip" data-start="15" data-duration="5" data-track-index="1">
        <div style="display: flex; flex-direction: column; align-items: center;">
          <p class="tech-detail" id="td2">CHAPTER IV</p>
          <h1 class="massive-text" id="t3">ICONIC<br>ARMS</h1>
          <div class="hit-label clip" id="label-2" style="top: 70%; left: 40%; transform: rotate(5deg);" data-start="16" data-duration="4" data-track-index="2">DEFINITIVE</div>
        </div>
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // --- Scene 1: THE MACHINE ---
      tl.from("#t1", { x: -300, opacity: 0, duration: 1.5, ease: "expo.out" }, 0.5);
      tl.from("#label-1", { scale: 0, rotation: 15, duration: 0.5, ease: "back.out(2)" }, 1);
      
      // Vertical Wipe Transition 1 (to Scene 2)
      tl.set("#wipe-v", { backgroundColor: "#003366" }, 4.5);
      tl.to("#wipe-v", { y: "0%", duration: 0.6, ease: "power4.in" }, 4.4);
      tl.to("#wipe-v", { y: "100%", duration: 0.6, ease: "power4.out" }, 5);

      // --- Scene 2: LOGIC ---
      // Entry
      tl.from("#gear", { scale: 0, opacity: 0, duration: 1.5, ease: "expo.out" }, 5.5);
      // Continuous Rotation (Starting from a specific value to avoid conflict)
      tl.fromTo("#gear", { rotation: -180 }, { rotation: 90, duration: 4.5, ease: "none" }, 5.5);
      tl.from("#td1", { opacity: 0, x: -30, duration: 1 }, 5.8);
      tl.from("#t2", { opacity: 0, y: 100, duration: 1.2, ease: "expo.out" }, 6);

      // Vertical Wipe Transition 2 (to Scene 3)
      tl.set("#wipe-v", { backgroundColor: "#ffcc00" }, 9.5);
      tl.to("#wipe-v", { y: "0%", duration: 0.6, ease: "power4.in" }, 9.4);
      tl.to("#wipe-v", { y: "-100%", duration: 0.6, ease: "power4.out" }, 10);

      // --- Scene 3: VALUE ---
      tl.from(".icon-card", { 
        scale: 0.8, 
        opacity: 0, 
        y: 50, 
        duration: 1, 
        stagger: 0.2, 
        ease: "back.out(1.7)" 
      }, 10.5);

      // Flash Transition 3 (to Scene 4)
      tl.to("#root", { backgroundColor: "#ffffff", duration: 0.1 }, 14.9);
      tl.to("#root", { backgroundColor: "#0a0a0a", duration: 0.4 }, 15);

      // --- Scene 4: LEGACY ---
      tl.from("#td2", { opacity: 0, tracking: 20, duration: 1.5, ease: "power2.out" }, 15.5);
      tl.from("#t3", { opacity: 0, scale: 1.2, filter: "blur(20px)", duration: 2, ease: "expo.out" }, 15.8);
      tl.from("#label-2", { x: -500, rotation: -20, duration: 0.8, ease: "power4.out" }, 16.5);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
