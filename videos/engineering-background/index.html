<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <script src="vendor/gsap.min.js"></script>
    <style>
      :root {
        --color-bg: #001219;
        --color-grid-major: rgba(0, 180, 216, 0.3);
        --color-grid-minor: rgba(0, 180, 216, 0.1);
        --color-accent: #94D2BD;
        --color-text: #CAF0F8;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px;
        overflow: hidden; background: var(--color-bg);
        font-family: 'Space Grotesk', sans-serif;
      }

      #root { position: relative; width: 100%; height: 100%; }
      .clip { position: absolute; }

      /* The Grid System */
      .blueprint-container {
        width: 2500px; height: 1500px;
        top: -200px; left: -200px;
        background-image: 
          linear-gradient(var(--color-grid-major) 2px, transparent 2px),
          linear-gradient(90deg, var(--color-grid-major) 2px, transparent 2px),
          linear-gradient(var(--color-grid-minor) 1px, transparent 1px),
          linear-gradient(90deg, var(--color-grid-minor) 1px, transparent 1px);
        background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
      }

      /* Technical Markings */
      .ruler-x {
        width: 100%; height: 30px;
        border-bottom: 1px solid var(--color-grid-major);
        display: flex; align-items: flex-end;
      }
      .ruler-y {
        height: 100%; width: 50px;
        border-right: 1px solid var(--color-grid-major);
        display: flex; flex-direction: column; align-items: flex-end;
      }

      .tick { font-size: 10px; color: var(--color-text); margin: 0 45px; }
      .tick-y { font-size: 10px; color: var(--color-text); margin: 45px 5px; }

      /* Scanning Effect */
      .scan-line {
        width: 4px; height: 100%;
        background: linear-gradient(to bottom, transparent, var(--color-accent), transparent);
        box-shadow: 0 0 20px var(--color-accent);
        opacity: 0.5;
        z-index: 10;
      }

      /* Noise/Texture */
      .overlay-noise {
        width: 100%; height: 100%;
        opacity: 0.03;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      .title {
        font-size: 32px; font-weight: 700;
        letter-spacing: 0.5em; text-transform: uppercase;
        color: var(--color-accent);
        top: 60px; left: 80px;
        border-left: 4px solid var(--color-accent);
        padding-left: 20px;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="10" data-width="1920" data-height="1080">
      
      <!-- Background Layers -->
      <div class="blueprint-container clip" id="grid"></div>
      
      <!-- Technical Details -->
      <div class="ruler-x clip" style="top: 0;">
        <div class="tick">000</div><div class="tick">100</div><div class="tick">200</div><div class="tick">300</div>
        <div class="tick">400</div><div class="tick">500</div><div class="tick">600</div><div class="tick">700</div>
      </div>
      <div class="ruler-y clip" style="left: 0;">
        <div class="tick-y">000</div><div class="tick-y">100</div><div class="tick-y">200</div><div class="tick-y">300</div>
      </div>

      <div class="scan-line clip" id="scanner"></div>
      <div class="overlay-noise clip"></div>

      <div class="title clip">SYSTEM ARCHIVE // GRID-081</div>

      <div class="clip" style="bottom: 60px; right: 80px; text-align: right;">
        <div style="font-size: 14px; color: var(--color-accent); opacity: 0.6;">COORDINATE SYSTEM: WGS84</div>
        <div style="font-size: 14px; color: var(--color-accent); opacity: 0.6;">DRAFT STATUS: AUTHORIZED</div>
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // 1. Subtle Camera Movement
      tl.fromTo("#grid", 
        { x: 0, y: 0, scale: 1 }, 
        { x: -50, y: -30, scale: 1.05, duration: 10, ease: "none" }, 
        0
      );

      // 2. The Scan Line
      tl.fromTo("#scanner", 
        { x: -100 }, 
        { x: 2000, duration: 4, repeat: 2, ease: "power1.inOut" }, 
        0
      );

      // 3. Flickering technical text
      const titles = [".title", "div[style*='bottom']"];
      tl.to(titles, {
        opacity: 0.7,
        duration: 0.1,
        repeat: 99,
        yoyo: true,
        ease: "rough({ template: none.out, strength: 1, points: 20, taper: 'none', randomize: true, clamp: false})"
      }, 0);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
