<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"></script>
    <style>
      :root {
        --color-bg: #ffeaa7; /* Warm yellow background */
        --color-text: #2d3436;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden;
        background: var(--color-bg); font-family: 'Space Grotesk', sans-serif; color: var(--color-text);
      }
      #root { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
      .clip { position: absolute; }
      
      .title {
        font-family: 'Bungee', cursive;
        font-size: 100px;
        position: absolute;
        top: 80px;
        color: #d63031;
        text-shadow: 6px 6px 0px #fdcb6e;
        -webkit-text-stroke: 3px white;
      }

      .wedge { 
        stroke: var(--color-bg); 
        stroke-width: 12px; 
        stroke-linejoin: round;
        filter: drop-shadow(0 20px 20px rgba(0,0,0,0.15)); 
      }
      
      .label-group {
        position: absolute;
        display: flex;
        align-items: center;
        font-size: 40px;
        font-family: 'Bungee', cursive;
        background: white;
        color: var(--color-text);
        padding: 15px 30px;
        border-radius: 50px;
        box-shadow: 0 10px 0px rgba(0,0,0,0.1);
        border: 4px solid var(--color-text);
      }
      .label-dot { width: 30px; height: 30px; border-radius: 50%; margin-right: 20px; border: 4px solid var(--color-text); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="10" data-width="1920" data-height="1080">
      
      <h1 class="title clip" id="main-title" data-start="0" data-duration="10" data-track-index="1">THE DATA SLICE</h1>
      
      <div style="position: relative; width: 1920px; height: 1080px; display: flex; justify-content: center; align-items: center;">
        <svg id="chart-svg" class="clip" style="width: 1000px; height: 1000px;" data-start="0.5" data-duration="9.5" data-track-index="2">
          <g id="chart-g" transform="translate(500, 500)"></g>
        </svg>
        
        <div id="labels" style="position: absolute; inset: 0; pointer-events: none;"></div>
      </div>
      
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      const data = [
        { label: "FUN", value: 45, color: "#ff7675" },
        { label: "GAMES", value: 25, color: "#74b9ff" },
        { label: "SNACKS", value: 20, color: "#55efc4" },
        { label: "NAPS", value: 10, color: "#a29bfe" }
      ];

      // 1. Title bounce
      tl.from("#main-title", { 
        y: -200, 
        opacity: 0, 
        rotation: -5, 
        scale: 0.5,
        duration: 1.5, 
        ease: "elastic.out(1, 0.4)" 
      }, 0.2);

      // 2. Setup D3 pie chart
      const pie = d3.pie().value(d => d.value).sort(null);
      const arcs = pie(data);
      
      const arcGen = d3.arc().innerRadius(0).outerRadius(380);
      const labelArc = d3.arc().innerRadius(460).outerRadius(460);

      const g = d3.select("#chart-g");

      arcs.forEach((d, i) => {
        // Draw the wedge, start with scale 0
        g.append("path")
          .attr("class", "wedge")
          .attr("id", "wedge-" + i)
          .attr("d", arcGen(d))
          .attr("fill", d.data.color)
          .style("transform", "scale(0)")
          .style("transform-origin", "0 0");

        // Bounce each wedge in
        tl.to("#wedge-" + i, {
          scale: 1,
          duration: 1.2,
          ease: "elastic.out(1, 0.5)"
        }, 0.5 + (i * 0.15));

        // Create the label HTML element
        const [x, y] = labelArc.centroid(d);
        const labelDiv = document.createElement('div');
        labelDiv.className = 'label-group clip';
        labelDiv.id = 'label-' + i;
        labelDiv.innerHTML = `<div class="label-dot" style="background:${d.data.color}"></div>${d.data.label} (${d.data.value}%)`;
        document.getElementById('labels').appendChild(labelDiv);
        
        // Use GSAP to set initial position based on centroid
        gsap.set(labelDiv, {
          xPercent: -50,
          yPercent: -50,
          left: 960 + x, // Center is 1920 / 2
          top: 540 + y   // Center is 1080 / 2
        });

        // Add hyperframes visibility control properties
        labelDiv.setAttribute('data-start', (1.0 + i * 0.15).toString());
        labelDiv.setAttribute('data-duration', (9.0 - i * 0.15).toString());
        labelDiv.setAttribute('data-track-index', (3 + i).toString());

        // Pop in the label
        // To be completely deterministic, we avoid Math.random() here and use hardcoded pseudo-random rotations
        const rotArr = [15, -20, 10, -15];
        tl.from(labelDiv, {
          scale: 0,
          rotation: rotArr[i],
          duration: 1,
          ease: "back.out(1.7)"
        }, 1.0 + (i * 0.15));
      });

      // 3. Playful Global Rotation
      tl.to("#chart-g", { 
        rotation: 45, 
        duration: 10, 
        ease: "power1.inOut" 
      }, 0);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
