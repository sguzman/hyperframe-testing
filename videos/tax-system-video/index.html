<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --color-fed: #cc0000;
        --color-state: #003366;
        --color-local: #d69e2e;
        --color-gray: #4a5568;
        --color-bg: #0a0a0a;
        --color-text: #ffffff;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--color-bg);
        font-family: 'Inter', sans-serif;
        color: var(--color-text);
      }

      #root { position: relative; width: 100%; height: 100%; }
      .scene { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; visibility: hidden; }
      .clip { position: absolute; }

      /* Typography */
      .massive-text {
        font-size: 200px;
        font-weight: 900;
        letter-spacing: -0.05em;
        line-height: 0.85;
        text-transform: uppercase;
        text-align: center;
      }

      .hit-label {
        font-size: 80px;
        font-weight: 900;
        background: var(--color-text);
        color: var(--color-bg);
        padding: 10px 40px;
        text-transform: uppercase;
        display: inline-block;
      }

      .narrative-p {
        font-family: 'Oswald', sans-serif;
        font-size: 50px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        text-align: center;
        max-width: 1200px;
      }

      /* Stacking Effect */
      .stack-block {
        width: 100%;
        height: 0;
        background: var(--color-gray);
        bottom: 0;
      }

      /* Transitions */
      .wipe {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 100;
        transform: translateY(-100%);
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="60" data-width="1920" data-height="1080">
      
      <!-- Transitions -->
      <div id="wipe-v" class="wipe clip" data-start="0" data-duration="60" data-track-index="99"></div>

      <!-- Scene 1: The Misconception (0-5s) -->
      <div id="scene-1" class="scene clip" data-start="0" data-duration="5" data-track-index="1" style="visibility: visible;">
        <div style="display: flex; flex-direction: column; align-items: center;">
          <h1 class="massive-text" id="t1">TAXES</h1>
          <p class="narrative-p" id="p1" style="margin-top: 40px;">ONE BIG THING?</p>
        </div>
      </div>

      <!-- Scene 2: The Stack (5-10s) -->
      <div id="scene-2" class="scene clip" data-start="5" data-duration="5" data-track-index="1">
        <div id="stack-container" style="width: 100%; height: 100%; display: flex; flex-direction: column-reverse;">
          <div class="stack-block clip" id="b1" style="background: var(--color-gray); height: 33.3%;" data-start="6" data-duration="4" data-track-index="10"></div>
          <div class="stack-block clip" id="b2" style="background: var(--color-state); height: 66.6%;" data-start="7" data-duration="3" data-track-index="11"></div>
          <div class="stack-block clip" id="b3" style="background: var(--color-fed); height: 100%;" data-start="8" data-duration="2" data-track-index="12"></div>
        </div>
        <h1 class="massive-text" id="t2" style="z-index: 10; color: #fff; text-shadow: 0 10px 30px rgba(0,0,0,0.5);">A STACK</h1>
      </div>

      <!-- Scene 3: Federal (10-18s) -->
      <div id="scene-3" class="scene clip" data-start="10" data-duration="8" data-track-index="1">
        <div class="clip" style="inset: 0; background: var(--color-fed);" data-start="10" data-duration="8" data-track-index="0"></div>
        <div style="display: flex; flex-direction: column; align-items: center;">
          <h1 class="massive-text" id="t3">FEDERAL</h1>
          <div id="fed-list" style="margin-top: 40px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;">
            <div class="hit-label clip" style="position: static;" data-start="12" data-duration="6" data-track-index="2">MILITARY</div>
            <div class="hit-label clip" style="position: static;" data-start="13" data-duration="5" data-track-index="3">SOCIAL SECURITY</div>
            <div class="hit-label clip" style="position: static;" data-start="14" data-duration="4" data-track-index="4">MEDICARE</div>
          </div>
        </div>
      </div>

      <!-- Scene 4: State (18-26s) -->
      <div id="scene-4" class="scene clip" data-start="18" data-duration="8" data-track-index="1">
        <div class="clip" style="inset: 0; background: var(--color-state);" data-start="18" data-duration="8" data-track-index="0"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; width: 100%; padding: 100px; gap: 100px;">
          <div style="text-align: right;">
            <h1 class="massive-text" style="font-size: 150px;">STATE</h1>
            <p class="narrative-p" style="text-align: right;">VARIABLE LAWS</p>
          </div>
          <div style="display: flex; flex-direction: column; justify-content: center; gap: 40px;">
            <div id="tx-ca" class="clip" style="position: static;" data-start="20" data-duration="6" data-track-index="2">
              <span class="hit-label">CA ⮕ TX</span>
            </div>
            <p class="narrative-p" id="p4" style="text-align: left;">TOTAL CHANGE</p>
          </div>
        </div>
      </div>

      <!-- Scene 5: Local (26-34s) -->
      <div id="scene-5" class="scene clip" data-start="26" data-duration="8" data-track-index="1">
        <div class="clip" style="inset: 0; background: var(--color-local);" data-start="26" data-duration="8" data-track-index="0"></div>
        <div style="display: flex; flex-direction: column; align-items: center;">
          <h1 class="massive-text" style="color: var(--color-bg);">LOCAL</h1>
          <p class="narrative-p" style="color: var(--color-bg); font-weight: 900;">ROADS • POLICE • SCHOOLS</p>
          <div class="hit-label clip" style="top: 70%;" data-start="28" data-duration="6" data-track-index="2">PROPERTY TAX</div>
        </div>
      </div>

      <!-- Scene 6: The Confusing Part (34-45s) -->
      <div id="scene-6" class="scene clip" data-start="34" data-duration="11" data-track-index="1">
        <div class="clip" style="inset: 0; background: #000;" data-start="34" data-duration="11" data-track-index="0"></div>
        <div id="hit-words" style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
          <h1 class="massive-text" style="font-size: 120px; color: var(--color-local);">NOT ONLY INCOME</h1>
          <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
            <div class="hit-label clip" style="position: static;" id="h1" data-start="36" data-duration="9" data-track-index="2">EARN</div>
            <div class="hit-label clip" style="position: static;" id="h2" data-start="37" data-duration="8" data-track-index="3">SPEND</div>
            <div class="hit-label clip" style="position: static;" id="h3" data-start="38" data-duration="7" data-track-index="4">OWN</div>
            <div class="hit-label clip" style="position: static;" id="h4" data-start="39" data-duration="6" data-track-index="5">SELL</div>
            <div class="hit-label clip" style="position: static;" id="h5" data-start="40" data-duration="5" data-track-index="6">RUN</div>
            <div class="hit-label clip" style="position: static;" id="h6" data-start="41" data-duration="4" data-track-index="7">INHERIT</div>
          </div>
        </div>
      </div>

      <!-- Scene 7: The Machine (45-55s) -->
      <div id="scene-7" class="scene clip" data-start="45" data-duration="10" data-track-index="1">
        <div class="clip" style="inset: 0; background: var(--color-gray);" data-start="45" data-duration="10" data-track-index="0"></div>
        <div style="display: flex; flex-direction: column; align-items: center;">
          <h1 class="massive-text" style="font-size: 150px;">A LAYERED<br>MACHINE</h1>
          <div id="final-stack" style="margin-top: 40px; display: flex; flex-direction: column; gap: 10px;">
            <div class="hit-label clip" style="position: static; width: 800px; text-align: center;" data-start="47" data-duration="8" data-track-index="2">FEDERAL</div>
            <div class="hit-label clip" style="position: static; width: 800px; text-align: center;" data-start="48" data-duration="7" data-track-index="3">STATE</div>
            <div class="hit-label clip" style="position: static; width: 800px; text-align: center;" data-start="49" data-duration="6" data-track-index="4">LOCAL</div>
          </div>
        </div>
      </div>

      <!-- Scene 8: Conclusion (55-60s) -->
      <div id="scene-8" class="scene clip" data-start="55" data-duration="5" data-track-index="1">
        <div style="display: flex; flex-direction: column; align-items: center; max-width: 1400px;">
          <h1 class="massive-text" style="font-size: 100px;">SMALLER PUZZLES</h1>
          <p class="narrative-p" style="margin-top: 40px;">AN ENTIRE BUREAUCRACY</p>
        </div>
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // --- Scene 1 ---
      tl.from("#t1", { scale: 0.5, opacity: 0, duration: 1, ease: "expo.out" }, 0.5);
      tl.from("#p1", { y: 30, opacity: 0, duration: 1 }, 1);

      // Transition 1
      tl.to("#wipe-v", { y: "0%", duration: 0.5, ease: "power4.in" }, 4.5);
      tl.set("#wipe-v", { backgroundColor: "#4a5568" }, 5);
      tl.to("#wipe-v", { y: "100%", duration: 0.5, ease: "power4.out" }, 5);

      // --- Scene 2 ---
      tl.from("#b1", { height: 0, duration: 0.8, ease: "expo.out" }, 6);
      tl.from("#b2", { height: 0, duration: 0.8, ease: "expo.out" }, 7);
      tl.from("#b3", { height: 0, duration: 0.8, ease: "expo.out" }, 8);
      tl.from("#t2", { opacity: 0, scale: 2, duration: 1.5, ease: "expo.out" }, 6.5);

      // Transition 2
      tl.to("#wipe-v", { y: "0%", duration: 0.5, ease: "power4.in" }, 9.5);
      tl.set("#wipe-v", { backgroundColor: "#cc0000" }, 10);
      tl.to("#wipe-v", { y: "-100%", duration: 0.5, ease: "power4.out" }, 10);

      // --- Scene 3 ---
      tl.from("#t3", { x: -200, opacity: 0, duration: 1.2, ease: "expo.out" }, 10.5);
      tl.from("#fed-list .hit-label", { scale: 0, opacity: 0, duration: 0.5, stagger: 0.2, ease: "back.out(2)" }, 12);

      // Transition 3
      tl.to("#wipe-v", { y: "0%", duration: 0.5, ease: "power4.in" }, 17.5);
      tl.set("#wipe-v", { backgroundColor: "#003366" }, 18);
      tl.to("#wipe-v", { y: "100%", duration: 0.5, ease: "power4.out" }, 18);

      // --- Scene 4 ---
      tl.from("#scene-4 h1", { opacity: 0, x: -100, duration: 1 }, 18.5);
      tl.from("#tx-ca", { x: 300, opacity: 0, duration: 1.2, ease: "expo.out" }, 20);

      // Transition 4
      tl.to("#wipe-v", { y: "0%", duration: 0.5, ease: "power4.in" }, 25.5);
      tl.set("#wipe-v", { backgroundColor: "#d69e2e" }, 26);
      tl.to("#wipe-v", { y: "-100%", duration: 0.5, ease: "power4.out" }, 26);

      // --- Scene 5 ---
      tl.from("#scene-5 h1", { scale: 1.5, opacity: 0, duration: 1.5, ease: "expo.out" }, 26.5);
      tl.from("#scene-5 .hit-label", { y: 100, opacity: 0, duration: 0.8 }, 28);

      // Transition 5
      tl.to("#wipe-v", { y: "0%", duration: 0.5, ease: "power4.in" }, 33.5);
      tl.set("#wipe-v", { backgroundColor: "#000000" }, 34);
      tl.to("#wipe-v", { y: "100%", duration: 0.5, ease: "power4.out" }, 34);

      // --- Scene 6 ---
      tl.from("#scene-6 h1", { opacity: 0, duration: 1 }, 34.5);
      
      // Hardcoded deterministic offsets to replace Math.random()
      const offsets = [
        {x: -100, y: -150}, {x: 120, y: -100}, {x: -150, y: 50},
        {x: 180, y: 120}, {x: -80, y: 200}, {x: 150, y: -220}
      ];

      tl.from("#hit-words .hit-label", { 
        opacity: 0, 
        scale: 0, 
        x: (i) => offsets[i].x,
        y: (i) => offsets[i].y,
        duration: 0.4, 
        stagger: 0.3, 
        ease: "back.out(2)" 
      }, 36);

      // Transition 6
      tl.to("#wipe-v", { y: "0%", duration: 0.5, ease: "power4.in" }, 44.5);
      tl.set("#wipe-v", { backgroundColor: "#4a5568" }, 45);
      tl.to("#wipe-v", { y: "-100%", duration: 0.5, ease: "power4.out" }, 45);

      // --- Scene 7 ---
      tl.from("#scene-7 h1", { y: -50, opacity: 0, duration: 1.2 }, 45.5);
      tl.from("#final-stack .hit-label", { x: -200, opacity: 0, duration: 0.8, stagger: 0.3, ease: "expo.out" }, 47);

      // Transition 7 (Flash)
      tl.to("#root", { backgroundColor: "#fff", duration: 0.1 }, 54.9);
      tl.to("#root", { backgroundColor: "#0a0a0a", duration: 0.5 }, 55);

      // --- Scene 8 ---
      tl.from("#scene-8 h1", { opacity: 0, scale: 0.8, duration: 2, ease: "power2.out" }, 55.5);
      tl.from("#scene-8 p", { opacity: 0, y: 20, duration: 1.5 }, 56.5);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
